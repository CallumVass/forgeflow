name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      releases_created: ${{ steps.release.outputs.releases_created }}
      pm_released: ${{ steps.release.outputs['packages/pm--release_created'] }}
      dev_released: ${{ steps.release.outputs['packages/dev--release_created'] }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          # Use a PAT (not GITHUB_TOKEN) so the release PR triggers required
          # status checks. PRs opened by GITHUB_TOKEN do not fire workflow
          # events, which would otherwise leave the release PR un-mergeable
          # under branch protection.
          token: ${{ secrets.RELEASE_PLEASE_TOKEN }}
          skip-labeling: true

  publish:
    needs: release-please
    if: needs.release-please.outputs.releases_created == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run build
      - run: npm run check
      - if: needs.release-please.outputs.pm_released == 'true'
        run: npm publish --access public --provenance -w packages/pm
      - if: needs.release-please.outputs.dev_released == 'true'
        run: npm publish --access public --provenance -w packages/dev
